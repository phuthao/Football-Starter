name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 8 * * *'  # 8am UTC mỗi ngày
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -s "${{ secrets.VITE_SUPABASE_URL }}/rest/v1/" \
            -H "apikey: ${{ secrets.VITE_SUPABASE_ANON_KEY }}" \
            -o /dev/null -w "%{http_code}"
